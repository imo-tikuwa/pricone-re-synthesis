name: Update lab submodule reference

on:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: imo-tikuwa/lab
          token: ${{ secrets.LAB_REPO_ACCESS_TOKEN }}
          submodules: true

      - name: Update submodule reference
        run: git submodule update --remote pages/pricone-re-synthesis

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || (git commit -m "chore: update pricone-re-synthesis submodule" && git push)
